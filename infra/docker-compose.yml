services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    image: node:24-alpine
    working_dir: /workspace
    command: ['sh', '-lc', 'cd /workspace && corepack enable && pnpm --filter @enterprise-agent-hub/api start']
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgresql://enterprise_agent_hub:enterprise_agent_hub@postgres:5432/enterprise_agent_hub
      PACKAGE_STORAGE_ROOT: /workspace/.data/package-artifacts
    ports:
      - '8787:8787'
    volumes:
      - ..:/workspace
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: enterprise_agent_hub
      POSTGRES_PASSWORD: enterprise_agent_hub
      POSTGRES_DB: enterprise_agent_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backup-agent:
    image: alpine:3.22
    command: ['sh', '-lc', 'echo backup-agent placeholder']
    profiles: ['ops']

volumes:
  postgres_data:
